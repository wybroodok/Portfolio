worker_processes auto;
events { worker_connections 4096; }

http {
  # ip_hash — sticky-сессии: WebSocket-хендшейк должен всегда попадать на тот
  # же инстанс. Кросс-инстансная доставка обеспечивается Redis-адаптером,
  # но сам сокет обязан жить на одном узле.
  upstream talkly_backend {
    ip_hash;
    server api1:4000;
    server api2:4000;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://talkly_backend;
      proxy_http_version 1.1;
      # Апгрейд до WebSocket
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 300s;
    }
  }
}
